<!DOCTYPE html>
<html>

    <head>

        <!-- 文字コード -->
        <meta charset="UTF-8">

        <!-- ページタイトル -->
        <title>News Tool</title>

        <style>

            /* ページ全体のスタイル */
            body{
                font-family: Arial;
                background:#f5f5f5;
                text-align:center;
            }

            /* コンテンツ中央配置 */
            .container{
                width:600px;
                margin:auto;
            }

            /* ボタンデザイン */
            button{
                padding:10px 20px;
                font-size:16px;
                margin:20px;
            }

            /* ニュースカード */
            .card{

            padding:10px;
            margin:10px;
            border:1px solid #ccc;
            display:block;
            text-decoration:none;
            color:black;

            }

            .card:hover{

            background:#f0f0f0;

            }

        </style>

    </head>

    <body>

        <div class="container">

            <!-- タイトル -->
            <h1>ニュース取得ツール</h1>

            <!-- ボタン -->
            <button onclick="getNews()">ニュース取得</button>

            <!-- ニュース表示エリア -->
            <div id="newsList"></div>

        </div>

        <script>

        // ニュース取得関数
        async function getNews(){

            // FastAPI APIにアクセス
            const response = await fetch("http://127.0.0.1:8000/news")

            // JSONに変換
            const data = await response.json()

            // ニュース表示エリア取得
            const list = document.getElementById("newsList")

            // 前のニュース削除
            list.innerHTML=""

            // APIエラー確認
            if(data.status === "error"){

                list.innerHTML="ニュース取得エラー"

                return
            }

            // ニュースデータを1つずつ処理
            data.data.forEach(news => {

                // aタグ作成（リンク）
                const a=document.createElement("a")

                // URL設定
                a.href=news.link

                // 新しいタブで開く
                a.target="_blank"

                // CSSクラス
                a.className="card"

                // タイトル表示
                a.textContent=news.title

                // HTMLに追加
                list.appendChild(a)

            })
        }

        // ページ読み込み時にニュース取得
        getNews()

        // 60秒ごとにニュース更新
        setInterval(getNews,60000)

        </script>
    </body>
</html>
