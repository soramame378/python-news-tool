<!DOCTYPE html>
<html>

    <head>

        <!-- 文字コード -->
        <meta charset="UTF-8">

        <!-- ページタイトル -->
        <title>News Tool</title>

        <style>

            /* ページ全体のスタイル */
            body{
                font-family: Arial;
                background:#f5f5f5;
                text-align:center;
            }

            /* コンテンツ中央配置 */
            .container{
                width:600px;
                margin:auto;
            }

            /* ボタンデザイン */
            button{
                padding:10px 20px;
                font-size:16px;
                margin:20px;
            }

            /* ニュースカード */
            .card{

            padding:10px;
            margin:10px;
            border:1px solid #ccc;
            display:block;
            text-decoration:none;
            color:black;

            }

            .card:hover{

            background:#f0f0f0;

            }

        </style>

    </head>

    <body>

        <div class="container">

            <!-- タイトル -->
            <h1>ニュース取得ツール</h1>

            <!-- ニュースカテゴリ選択 -->
            <select id="category">
                <option value="top">トップ</option>
                <option value="it">IT</option>
                <option value="business">経済</option>
                <option value="world">国際</option>
                <option value="sports">スポーツ</option>
            </select>

            <!-- ボタン -->
            <button onclick="getNews()">ニュース取得</button>

            <!-- ニュース表示エリア -->
            <div id="newsList"></div>

        </div>

        <script>

        // ニュース取得関数
        async function getNews(){

            // カテゴリ取得
            const category = document.getElementById("category").value

            // API URL（カテゴリ付き）
            const url = "https://python-news-tool.onrender.com/news?category=" + category

            // APIアクセス
            const response = await fetch(url)

            // JSON変換
            const data = await response.json()

            const list = document.getElementById("newsList")

            list.innerHTML=""

            if(data.status === "error"){

                list.innerHTML="ニュース取得エラー"

                return
            }

            data.data.forEach(news => {

                const a=document.createElement("a")

                a.href=news.link

                a.target="_blank"

                a.className="card"

                a.textContent=news.title

                list.appendChild(a)

            })
}
        // ページ読み込み時にニュース取得
        getNews()

        // 60秒ごとにニュース更新
        setInterval(getNews,60000)

        </script>
    </body>
</html>
