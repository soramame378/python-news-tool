<!DOCTYPE html>
<html>

    <head>

        <!-- 文字コード -->
        <meta charset="UTF-8">

        <!-- ページタイトル -->
        <title>News Tool</title>

        <style>

            /* ページ全体のスタイル */
            body{
                font-family: Arial;
                background:#f5f5f5;
                text-align:center;
            }

            /* コンテンツ中央配置 */
            .container{
                width:600px;
                margin:auto;
            }

            /* ボタンデザイン */
            button{
                padding:10px 20px;
                font-size:16px;
                margin:20px;
            }

            /* ニュースカード */
            .card{
                background:white;
                padding:15px;
                margin:10px;
                border-radius:8px;
                box-shadow:0 2px 5px rgba(0,0,0,0.2);
            }

        </style>

    </head>

    <body>

        <div class="container">

            <!-- タイトル -->
            <h1>ニュース取得ツール</h1>

            <!-- ボタン -->
            <button onclick="getNews()">ニュース取得</button>

            <!-- ニュース表示エリア -->
            <div id="newsList"></div>

        </div>

        <script>

        // ニュースを取得する非同期関数
        async function getNews(){

            // FastAPIの /news APIにアクセス
            const response = await fetch("http://127.0.0.1:8000/news")

            // JSON形式に変換
            const data = await response.json()

            // ニュース表示エリアを取得
            const list = document.getElementById("newsList")

            // 以前のニュースを削除
            list.innerHTML=""

            // APIがエラーを返した場合
            if(data.status === "error"){

                // エラーメッセージ表示
                list.innerHTML="ニュース取得エラー"

                return
            }

            // ニュース配列を1つずつ処理
            data.data.forEach(news => {

                const div=document.createElement("div")

                div.className="card"

                div.textContent=news

                list.appendChild(div)

            })
        }

        </script>
    </body>
</html>
